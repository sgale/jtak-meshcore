# jTAK — add these location blocks inside the OTS HTTP server block
# (the one listening on port 8080)
# File: /etc/nginx/sites-enabled/opentakserver  (the 8080 server block)

location /jtak/ {
    alias /opt/jtak/frontend/;
    index index.html;
    try_files $uri $uri/ /jtak/index.html;
}

location /jtak/api/ {
    proxy_pass http://127.0.0.1:8420/api/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_read_timeout 86400;
}
