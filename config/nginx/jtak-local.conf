# jTAK local access — HTTPS on __HOSTNAME__, HTTP on AP IP
# Installed by: /opt/jtak/scripts/deploy.sh
#
# Hub-specific values replaced by deploy.sh:
#   __HOSTNAME__  → e.g. jtak2.local
#   __CERT__      → e.g. /etc/nginx/jtak2-local.crt
#   __KEY__       → e.g. /etc/nginx/jtak2-local.key

# HTTP → HTTPS redirect for __HOSTNAME__
server {
    listen 80;
    listen [::]:80;
    server_name __HOSTNAME__;
    return 301 https://$host$request_uri;
}

# HTTPS — __HOSTNAME__
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name __HOSTNAME__;

    ssl_certificate     __CERT__;
    ssl_certificate_key __KEY__;

    location /jtak/ {
        alias /opt/jtak/frontend/;
        index index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        expires 0;
        try_files $uri $uri/ /jtak/index.html;
    }

    location /jtak/api/ {
        proxy_pass http://127.0.0.1:8420/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;
        proxy_buffering off;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }
}

# HTTP fallback — AP IP only (no cert for raw IP)
server {
    listen 80;
    listen [::]:80;
    server_name 10.42.0.1;

    location /jtak/ {
        alias /opt/jtak/frontend/;
        index index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        expires 0;
        try_files $uri $uri/ /jtak/index.html;
    }

    location /jtak/api/ {
        proxy_pass http://127.0.0.1:8420/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;
        proxy_buffering off;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }
}
